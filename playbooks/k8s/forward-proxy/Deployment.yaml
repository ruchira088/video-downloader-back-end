apiVersion: apps/v1
kind: Deployment
metadata:
  name: forward-proxy-deployment
  namespace: "{{ k8s_namespace }}"
spec:
  selector:
    matchLabels:
      app: forward-proxy
      branch: "{{ git_branch }}"
  template:
    metadata:
      labels:
        app: forward-proxy
        branch: "{{ git_branch }}"
    spec:
      imagePullSecrets:
        - name: docker-registry-credentials
      containers:
        - name: forward-proxy-container
          image: "ghcr.io/ruchira088/video-downloader-forward-proxy:{{ git_branch }}-{{ git_commit }}"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          envFrom:
            - configMapRef:
                name: forward-proxy-data-config-map
            - secretRef:
                name: forward-proxy-secrets
          startupProbe:
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
            tcpSocket:
              port: tiny-proxy-port
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            exec:
              command:
                - /healthcheck.sh
                - liveness
          readinessProbe:
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 3
            exec:
              command:
                - /healthcheck.sh
                - readiness
          ports:
            - name: tiny-proxy-port
              containerPort: 8888
          volumeMounts:
            - mountPath: /dev/net/tun
              name: tun-device
            - mountPath: /etc/openvpn/configs
              name: file-config-map
      volumes:
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: file-config-map
          configMap:
            name: forward-proxy-file-config-map