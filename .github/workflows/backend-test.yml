name: Backend - Compile & Test

on: workflow_call

jobs:
  compile-and-test:
    name: Compile & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-${{ hashFiles('**/build.properties') }}-${{ hashFiles('**/plugins.sbt') }}-${{ hashFiles('**/Dependencies.scala') }}
          path: |
            ~/.sbt
            ~/.cache/coursier
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('**/build.properties') }}-${{ hashFiles('**/plugins.sbt') }}
            ${{ runner.os }}-${{ hashFiles('**/build.properties') }}
            ${{ runner.os }}

      - name: Compile
        run: sbt compile "Test / compile"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install ffmpeg -y

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run tests with coverage
        run: sbt coverage test coverageAggregate

      - name: Upload test results
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: Scala Test Results
          path: "target/test-reports/*.xml"
          reporter: java-junit

      - name: Print coverage summary
        if: success() || failure()
        run: |
          echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/scala-2.13/scoverage-report/scoverage.xml ]; then
            STATEMENT=$(grep -oP 'statement-count="\K[^"]+' target/scala-2.13/scoverage-report/scoverage.xml | head -1)
            COVERED=$(grep -oP 'statements-invoked="\K[^"]+' target/scala-2.13/scoverage-report/scoverage.xml | head -1)
            STMT_PERCENT=$(grep -oP 'statement-rate="\K[^"]+' target/scala-2.13/scoverage-report/scoverage.xml | head -1)
            BRANCH_PERCENT=$(grep -oP 'branch-rate="\K[^"]+' target/scala-2.13/scoverage-report/scoverage.xml | head -1)
            PERCENT_INT=${STMT_PERCENT%.*}
            if [ "$PERCENT_INT" -ge 80 ]; then
              STMT_EMOJI="🟢"
              MESSAGE="Excellent coverage! 🎉"
            elif [ "$PERCENT_INT" -ge 60 ]; then
              STMT_EMOJI="🟡"
              MESSAGE="Good coverage, but room for improvement 💪"
            else
              STMT_EMOJI="🔴"
              MESSAGE="Coverage needs attention 🔧"
            fi
            BRANCH_INT=${BRANCH_PERCENT%.*}
            if [ "$BRANCH_INT" -ge 80 ]; then
              BRANCH_EMOJI="🟢"
            elif [ "$BRANCH_INT" -ge 60 ]; then
              BRANCH_EMOJI="🟡"
            else
              BRANCH_EMOJI="🔴"
            fi
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ${STMT_EMOJI} Statement Coverage | **${STMT_PERCENT}%** |" >> $GITHUB_STEP_SUMMARY
            echo "| ${BRANCH_EMOJI} Branch Coverage | **${BRANCH_PERCENT}%** |" >> $GITHUB_STEP_SUMMARY
            echo "| 📝 Statements Covered | ${COVERED} / ${STATEMENT} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "${MESSAGE}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: coverage-report
          path: target/scala-2.13/scoverage-report/
