name: Fallback API Pipeline

on:
  push:
    branches:
      - "**"

concurrency:
  group: fallback-api-job-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./fallback-api

jobs:
  execute-test-suite:
    name: Execute test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "fallback-api/.python-version"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.dev.txt

      - name: Check formatting
        run: ruff format --check

      - name: Check linting
        run: ruff check

      - name: Type check
        run: mypy src

      - name: Execute test suite
        run: pytest -v .

  deploy-to-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest

    environment: Staging

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    needs:
      - execute-test-suite

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ap-southeast-2
          role-session-name: fallback-api-staging-deploy
          role-to-assume: "arn:aws:iam::365562660444:role/github_iam_role"

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: SAM build
        run: sam build

      - name: Deploy to staging
        run: sam deploy

  deploy-to-production:
    name: Deploy to production
    runs-on: ubuntu-latest

    environment: Production

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    needs:
      - deploy-to-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ap-southeast-2
          role-session-name: fallback-api-production-deploy
          role-to-assume: "arn:aws:iam::365562660444:role/github_iam_role"

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: SAM build
        run: sam build

      - name: Deploy to staging
        run: sam deploy --config-env prod

  send-notification:
    name: Send Slack notification
    runs-on: ubuntu-latest
    if: always()

    permissions:
      id-token: write

    needs:
      - execute-test-suite
      - deploy-to-staging
      - deploy-to-production

    steps:
      - name: Send Slack notification
        uses: ruchira088/slack-github-action@v1


