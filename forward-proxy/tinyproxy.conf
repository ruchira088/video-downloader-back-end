Port 8888
Listen 0.0.0.0
Timeout 600
MaxClients 100

# Allow private network ranges — adjust to match your LAN
Allow 127.0.0.1/8
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# Log to a regular file (Tinyproxy rejects /dev/stdout)
LogFile "/var/log/tinyproxy.log"
LogLevel Info

# Required headers
ViaProxyName "tinyproxy"
